name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish-pypi:
    runs-on: macos-14
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build package
        run: |
          python -m pip install --upgrade build twine
          rm -rf dist build *.egg-info bindings/python/*.egg-info
          python -m build
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
