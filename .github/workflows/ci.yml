name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    name: Run tests
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: Generate Tonel method fixtures
        run: python scripts/tonel_to_methods.py --fail-on-skip
      - name: Ensure generated fixtures are committed
        run: git diff --exit-code -- test/corpus/tonel_methods.txt
      - name: Set up tree-sitter
        uses: tree-sitter/setup-action/cli@v2
        with:
          tree-sitter-ref: v0.26.9
      - name: Run tests
        uses: tree-sitter/parser-test-action@v2
        with:
          test-rust: true
          test-python: true
